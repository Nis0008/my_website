<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Letter To You 💌</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: Poppins;
        text-align: center;
      }
      video {
        position: fixed;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }
      .overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        z-index: -1;
      }
      h1 {
        font-family: "Great Vibes";
        font-size: 56px;
        color: #c4002f;
        margin-top: 50px;
      }
      #letter {
        max-width: 900px;
        margin: 40px auto;
        font-size: 20px;
        line-height: 2;
         color:white;
      }
      .heart {
        position: fixed;
        bottom: -20px;
        color: #ff4d6d;
        animation: floatUp 6s linear infinite;
      }
      @keyframes floatUp {
        to {
          transform: translateY(-100vh);
          opacity: 0;
        }
      }
      .bg-image{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("media/a.jpeg") no-repeat center center;
  background-size: cover;
  z-index: -1;
}
@media (max-width:768px){
  .bg-image{
    background-position: center top;
  }
}
      /* Dark overlay (optional but recommended) */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.35);
        z-index: -1;
      }

      /* Page content must be above video */
      body {
        margin: 0;
        padding: 0;
        position: relative;
        z-index: 1;
      }
    </style>
  </head>

  <body>
     <div class="bg-image"></div>
    <!-- <video autoplay muted loop>
      <source src="background.mp4" />
    </video> -->
    <div class="overlay"></div>

    <h1>My Forever Letter 💌</h1>

    <div id="letter">
      Nixon ❤️,<br /><br />
      You are my today, my tomorrow, and my forever ♾️. Thank you for loving me,
      protecting me, and choosing me every day. I promise to love you deeper,
      stronger, and endlessly 💖.<br /><br />
      Happy Birthday, my love 🎂🎉 Forever yours,<br />
      Sheji Nishoni 💞
    </div>
    <!-- <video class="bg-video" autoplay muted loop playsinline>
      <source src="media/background.mp4" type="video/mp4" />
    </video> -->

    <script>
      function createHeart() {
        const h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
      }
      setInterval(createHeart, 500);
      const music = document.getElementById("bgMusic");

      // Check if music already started
      if (localStorage.getItem("musicStarted") === "true") {
        music.volume = 0.6;
        music.play().catch(() => {});
        const btn = document.getElementById("startBtn");
        if (btn) btn.style.display = "none";
      }

      function startMusic() {
        music.volume = 0.6;
        music.play();
        localStorage.setItem("musicStarted", "true");
        document.getElementById("startBtn").style.display = "none";
      }
    </script>
  </body>
</html>
