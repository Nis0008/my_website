<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Story ❤️</title>

    <!-- Romantic Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        height: 100vh;
        overflow: hidden;
        color: white;
      }

      /* Background video */
      .bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.55);
        z-index: -1;
      }

      /* Heading */
      .story-title {
        text-align: center;
        font-family: "Great Vibes", cursive;
        font-size: 3.2rem;
        color: #ff4d6d;
        margin-top: 30px;
        margin-bottom: 20px;
      }

      /* Video gallery container */
      .gallery {
        width: 90%;
        max-width: 420px;
        margin: 0 auto;
        position: relative;
        height: 65vh;
      }

      /* Videos */
      .gallery video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 18px;
        opacity: 0;
        transition: opacity 1.5s ease;
      }

      .gallery video.active {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <!-- Background video -->
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="media/background.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>

    <!-- Heading -->
    <h1 class="story-title">Our Story ❤️✨</h1>

    <!-- Video Gallery -->
    <div class="gallery">
      <video src="media/sty1.mp4" muted></video>
      <video src="media/sty2.mp4" muted></video>
      <video src="media/sty3.mp4" muted></video>
    </div>
    <a href="letter.html" class="next-btn">Letter 💖</a>
    <script>
      const videos = document.querySelectorAll(".gallery video");
      let current = 0;

      function playVideo(index) {
        videos.forEach((v) => {
          v.pause();
          v.currentTime = 0;
          v.classList.remove("active");
        });

        const video = videos[index];
        video.classList.add("active");
        video.play();

        video.onended = () => {
          current = (current + 1) % videos.length;
          playVideo(current);
        };
      }

      playVideo(current);
    </script>
  </body>
</html>
