
<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Promise ❤️</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: Poppins;
        text-align: center;
        background: white;
      }
      video {
        position: fixed;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }
      .overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.7);
        z-index: -1;
      }
      h1 {
        font-family: "Great Vibes";
        font-size: 56px;
        color: #c4002f;
        margin-top: 60px;
        animation: fade 2s;
      }
      p {
        max-width: 800px;
        margin: 30px auto;
        font-size: 18px;
        line-height: 1.8;
        animation: fade 3s;
        color:white;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .next-btn {
        display: inline-block;
        margin: 40px;
        padding: 12px 30px;
        background: #c4002f;
        color: white;
        border-radius: 30px;
        text-decoration: none;
      }
      .next-btn:hover {
      background: #ffffff;
      color: #ff3b3b;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 12px 30px rgba(255, 59, 59, 0.6);
    }
      .heart {
        position: fixed;
        bottom: -20px;
        color: #ff4d6d;
        font-size: 20px;
        animation: floatUp 6s linear infinite;
        opacity: 0.7;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) scale(1.5);
          opacity: 0;
        }
      }
     .bg-image{
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("media/a.jpeg") no-repeat center center;
      background-size: cover;
      z-index: -1;
      }
      @media (max-width:768px){
      .bg-image{
      background-position: center top;
      }
    }

      /* Dark overlay (optional but recommended) */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.35);
        z-index: -1;
      }

      /* Page content must be above video */
      body {
        margin: 0;
        padding: 0;
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
     <div class="bg-image"></div>
    <video autoplay muted loop>
      <source src="background.mp4" />
    </video>
    <div class="overlay"></div>

    <h1>My Promise To You 💍</h1>
    <p>
      Nixon my sweat heart ❤️, I promise to stand by you in every joy and every
      storm. I promise to support your dreams💖, to hold your hand when life feels
      heavy💖, and to love you deeper with every passing day💖. You are my today, my
      tomorrow, and my forever💖.
    </p>

    <a href="forever.html" class="next-btn">💖💖Forever💖💖</a>
    <!-- <video class="bg-video" autoplay muted loop playsinline>
      <source src="media/background.mp4" type="video/mp4" />
    </video> -->
    <!-- <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio> -->
    <!-- HEARTS -->
    <script>
      function createHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = Math.random() * 3 + 4 + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
      }
      setInterval(createHeart, 500);
      setInterval(createHeart, 500);
      const music = document.getElementById("bgMusic");

      // Check if music already started
      if (localStorage.getItem("musicStarted") === "true") {
        music.volume = 0.6;
        music.play().catch(() => {});
        const btn = document.getElementById("startBtn");
        if (btn) btn.style.display = "none";
      }

      function startMusic() {
        music.volume = 0.6;
        music.play();
        localStorage.setItem("musicStarted", "true");
        document.getElementById("startBtn").style.display = "none";
      }
    </script>
  </body>
</html>
