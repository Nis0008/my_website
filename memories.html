<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Memories ❤️</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Poppins, sans-serif;
        overflow: hidden;
        text-align: center;
        background: #000;
      }

      .bg-image{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("media/a.jpeg") no-repeat center center;
  background-size: cover;
  z-index: -1;
}
@media (max-width:768px){
  .bg-image{
    background-position: center top;
  }
}
      /* Soft overlay */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.65);
        z-index: -2;
      }

      /* Title */
      h1 {
        font-family: "Great Vibes";
        font-size: 60px;
        color: #c4002f;
        margin-top: 40px;
      }

      /* Scene for 3D */
      .scene {
        width: 100%;
        height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        perspective: 1200px;
      }

      /* Slider */
      .slider {
        position: relative;
        width: 380px;
        height: 520px;
        transform-style: preserve-3d;
      }

      /* Card */
      .card {
        position: absolute;
        inset: 0;
        border-radius: 24px;
        overflow: hidden;
        background: #fff;
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.35),
          0 10px 20px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transform: translateZ(-200px) scale(0.85) rotateY(8deg);
        transition:
          opacity 1s ease,
          transform 1s ease;
      }

      /* Active 3D card */
      .card.active {
        opacity: 1;
        transform: translateZ(0) scale(1) rotateY(0deg);
        z-index: 2;
      }

      /* Image */
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Caption */
      .caption {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 16px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        color: #fff;
        font-size: 17px;
      }

      /* Next button */
      .next-btn {
        display: inline-block;
        margin: 20px auto 40px;
        padding: 14px 36px;
        background: #c4002f;
        color: #fff;
        text-decoration: none;
        border-radius: 30px;
      }

      /* Floating hearts */
      .heart {
        position: fixed;
        bottom: -20px;
        color: #ff4d6d;
        font-size: 22px;
        animation: floatUp 6s linear infinite;
        opacity: 0.8;
      }

      @keyframes floatUp {
        to {
          transform: translateY(-110vh) scale(1.4);
          opacity: 0;
        }
      }

      /* Mobile */
      @media (max-width: 600px) {
        h1 {
          font-size: 44px;
        }
        .slider {
          width: 280px;
          height: 420px;
        }
      }
      /* Background video fix */
      .bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -2;
      }

      /* Dark overlay (optional but recommended) */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.35);
        z-index: -1;
      }

      /* Page content must be above video */
      body {
        margin: 0;
        padding: 0;
        position: relative;
        z-index: 1;
      }
    </style>
  </head>

  <body>
   <div class="bg-image"></div>
    <div class="overlay"></div>

    <h1>Our Memories 📸❤️</h1>

    <div class="scene">
      <div class="slider">
        <div class="card active">
          <img src="photos/pic2.jpg" />
          <div class="caption">Where everything started 💕</div>
        </div>

        <div class="card">
          <img src="photos/pic10.jpeg" />
          <div class="caption">Smiles that stole my heart 😊</div>
        </div>

        <div class="card">
          <img src="photos/pic2.jpeg" />
          <div class="caption">Moments I’ll cherish forever ✨</div>
        </div>

        <div class="card">
          <img src="photos/pic10.jpeg" />
          <div class="caption">Together feels like home 🏡</div>
        </div>

        <div class="card">
          <img src="photos/pic2.jpeg" />
          <div class="caption">Love in every frame 💖</div>
        </div>

        <div class="card">
          <img src="photos/pic10.jpeg" />
          <div class="caption">Laughing with you 😂</div>
        </div>

        <div class="card">
          <img src="photos/pic2.jpeg" />
          <div class="caption">My favorite memories 💞</div>
        </div>

        <div class="card">
          <img src="photos/pic10.jpeg" />
          <div class="caption">You & me ♾️</div>
        </div>

        <div class="card">
          <img src="photos/pic2.jpeg" />
          <div class="caption">Still falling for you ❤️</div>
        </div>

        <div class="card">
          <img src="photos/pic10.jpeg" />
          <div class="caption">Forever us 💍</div>
        </div>
      </div>
    </div>

    <a href="story.html" class="next-btn">OUR STORY🌈</a>
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="media/background.mp4" type="video/mp4" />
    </video>
    <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>
    <!-- Slideshow -->
    <script>
      const cards = document.querySelectorAll(".card");
      let i = 0;

      setInterval(() => {
        cards[i].classList.remove("active");
        i = (i + 1) % cards.length;
        cards[i].classList.add("active");
      }, 2000);
    </script>

    <!-- Hearts -->
    <script>
      function createHeart() {
        const h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
      }
      setInterval(createHeart, 500);
      const music = document.getElementById("bgMusic");

      // Check if music already started
      if (localStorage.getItem("musicStarted") === "true") {
        music.volume = 0.6;
        music.play().catch(() => {});
        const btn = document.getElementById("startBtn");
        if (btn) btn.style.display = "none";
      }

      function startMusic() {
        music.volume = 0.6;
        music.play();
        localStorage.setItem("musicStarted", "true");
        document.getElementById("startBtn").style.display = "none";
      }
    </script>
  </body>
</html>
